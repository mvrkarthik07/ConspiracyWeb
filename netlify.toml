[build]
  command = "npm ci --loglevel verbose && npm ci --prefix frontend --loglevel verbose && npm run build:frontend --loglevel verbose"
  publish = "frontend/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
