[build]
  command = "node -v && npm -v && npm ci --include=dev && npm ci --prefix frontend --include=dev && npm run build:frontend"
  publish = "frontend/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
